<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Bangladesh Dream Tour</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav class="navbar" id="navbar">
  <div class="nav-brand"><span class="brand-name">Bangladesh <em>Dream Tour</em></span></div>
  <ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="tours.html">Tours</a></li></ul>
  <div class="nav-actions"><a href="register.html" class="btn-outline">Register</a></div>
</nav>
<section class="auth-wrap">
  <div class="auth-box">
    <div class="auth-brand"><span class="brand-name" style="font-family:var(--font-display);font-size:22px;">Bangladesh <em style="color:var(--gold);">Dream Tour</em></span><span class="brand-tagline" style="font-size:9px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;">Discover the Beauty Within</span></div>
    <h2>Welcome Back</h2>
    <p class="auth-sub">Sign in to manage your Bangladesh travel bookings</p>
    <form action="php/login.php" method="POST" id="login-form">
      <div class="form-group"><label>Email Address</label><input type="email" name="email" placeholder="your@email.com" required/></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="••••••••" required/></div>
      <div class="auth-row">
        <label class="chk-label"><input type="checkbox" name="remember"/> Remember me</label>
        <a href="#" class="auth-link">Forgot password?</a>
      </div>
      <div id="login-msg" class="form-msg"></div>
      <button type="submit" class="btn-primary full-btn">Sign In →</button>
    </form>
    <p class="auth-switch">Don't have an account? <a href="register.html">Register here</a></p>
  </div>
</section>
<script src="js/main.js"></script><script src="js/auth.js"></script>
</body>
</html>
